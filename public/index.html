<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>Game Guide</title>
    <script>
      (function () {
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', '/api/settings', false);
          xhr.send();
          if (xhr.status === 200) {
            var settings = JSON.parse(xhr.responseText);
            if (settings.theme === 'dark') {
              document.documentElement.setAttribute('data-theme', 'dark');
            }
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/icons.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/viewer.css" />
    <link rel="stylesheet" href="/css/text-viewer.css" />
    <link rel="stylesheet" href="/css/settings.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="/js/api.js"></script>
    <script src="/js/components/document-card.js"></script>
    <script src="/js/components/toolbar.js"></script>
    <script src="/js/components/touch-handler.js"></script>
    <script src="/js/components/progress-bar.js"></script>
    <script src="/js/components/bookmark-panel.js"></script>
    <script src="/js/pages/home.js"></script>
    <script src="/js/pages/browse.js"></script>
    <script src="/js/pages/search.js"></script>
    <script src="/js/pages/viewer.js"></script>
    <script src="/js/pages/text-viewer.js"></script>
    <script src="/js/pages/settings.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
